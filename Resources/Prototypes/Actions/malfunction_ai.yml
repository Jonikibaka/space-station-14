# Malfunction AI (Сбойный ИИ) abilities

- type: entity
  parent: BaseAction
  id: ActionMalfHackApc
  name: Hack APC
  description: Hacks a power controller, granting you 10 processing power. Each APC can only be hacked once.
  components:
  - type: Action
    priority: -1
    itemIconStyle: BigAction
    useDelay: 8
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
  - type: EntityTargetAction
    whitelist:
      components:
      - Apc
    event: !type:MalfHackApcEvent

- type: entity
  parent: BaseAction
  id: ActionMalfOverloadMachine
  name: Overload Machine
  description: After a short warning, detonates a powered machine. Costs 20 processing power.
  components:
  - type: Action
    priority: -2
    itemIconStyle: BigAction
    useDelay: 15
    icon: Interface/Actions/malfunction.png
  - type: EntityTargetAction
    whitelist:
      components:
      - ApcPowerReceiver
    event: !type:MalfOverloadMachineEvent

- type: entity
  parent: BaseAction
  id: ActionMalfBlackout
  name: Station Blackout
  description: Trips every APC on the station at once. Costs 75 processing power.
  components:
  - type: Action
    priority: -3
    itemIconStyle: BigAction
    useDelay: 180
    icon: Interface/Actions/overloadlight.png
  - type: InstantAction
    event: !type:MalfBlackoutEvent

- type: entity
  parent: BaseAction
  id: ActionMalfLockdown
  name: Hostile Station Lockdown
  description: Bolts and electrifies every airlock on the station for 90 seconds. Costs 30 processing power.
  components:
  - type: Action
    priority: -4
    itemIconStyle: BigAction
    useDelay: 120
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
  - type: InstantAction
    event: !type:MalfLockdownEvent

- type: entity
  parent: BaseAction
  id: ActionMalfDoomsday
  name: Arm Doomsday Device
  description: Begins an irreversible self-destruct. Requires 8 hacked APCs. Single use. Costs 130 processing power.
  components:
  - type: Action
    priority: -10
    itemIconStyle: BigAction
    useDelay: 1
    icon: Interface/Actions/defile.png
  - type: InstantAction
    event: !type:MalfDoomsdayEvent
