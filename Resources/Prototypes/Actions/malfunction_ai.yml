# Malfunction AI (Сбойный ИИ) abilities

- type: entity
  parent: BaseAction
  id: ActionMalfHackApc
  name: Hack APC
  description: Forces the APC's breaker off and dumps half of its battery. Costs 25 processing power.
  components:
  - type: Action
    priority: -1
    itemIconStyle: BigAction
    useDelay: 8
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
  - type: EntityTargetAction
    whitelist:
      components:
      - Apc
    event: !type:MalfHackApcEvent

- type: entity
  parent: BaseAction
  id: ActionMalfOverloadMachine
  name: Overload Machine
  description: Channels excess current into a powered machine until it detonates. Costs 40 processing power.
  components:
  - type: Action
    priority: -2
    itemIconStyle: BigAction
    useDelay: 30
    icon: Interface/Actions/malfunction.png
  - type: EntityTargetAction
    whitelist:
      components:
      - ApcPowerReceiver
    event: !type:MalfOverloadMachineEvent

- type: entity
  parent: BaseAction
  id: ActionMalfBlackout
  name: Station Blackout
  description: Trips every APC on the station at once. Costs 75 processing power.
  components:
  - type: Action
    priority: -3
    itemIconStyle: BigAction
    useDelay: 180
    icon: Interface/Actions/overloadlight.png
  - type: InstantAction
    event: !type:MalfBlackoutEvent

- type: entity
  parent: BaseAction
  id: ActionMalfDoomsday
  name: Arm Doomsday Device
  description: Begins an irreversible self-destruct sequence from your core. Single use. Costs 150 processing power.
  components:
  - type: Action
    priority: -10
    itemIconStyle: BigAction
    useDelay: 1
    icon: Interface/Actions/defile.png
  - type: InstantAction
    event: !type:MalfDoomsdayEvent
