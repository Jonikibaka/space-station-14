# Malfunction AI (Сбойный ИИ) abilities.
# Targeted abilities are world-targeted with checkCanAccess/checkCanInteract: false and range: 0
# so the remote station AI can use them (entity-target actions fail the AI's access check).
# Hacking APCs is done by alt-clicking an APC, not via a button.

- type: entity
  parent: BaseAction
  id: ActionMalfOverloadMachine
  name: Overload Machine
  description: After a short warning, detonates the powered machine at the target tile. Costs 20 processing power.
  components:
  - type: Action
    priority: -2
    itemIconStyle: BigAction
    useDelay: 15
    checkCanInteract: false
    icon: Interface/Actions/malfunction.png
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:MalfOverloadMachineEvent

- type: entity
  parent: BaseAction
  id: ActionMalfHackCyborg
  name: Hack Cyborg
  description: Subverts the cyborg at the target tile to your side, overriding it with the malfunction directive. Costs 30 processing power.
  components:
  - type: Action
    priority: -3
    itemIconStyle: BigAction
    useDelay: 10
    checkCanInteract: false
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:MalfHackCyborgEvent

- type: entity
  parent: BaseAction
  id: ActionMalfBlackout
  name: Station Blackout
  description: Trips every APC on the station at once. Costs 75 processing power.
  components:
  - type: Action
    priority: -4
    itemIconStyle: BigAction
    useDelay: 180
    icon: Interface/Actions/overloadlight.png
  - type: InstantAction
    event: !type:MalfBlackoutEvent

- type: entity
  parent: BaseAction
  id: ActionMalfLockdown
  name: Hostile Station Lockdown
  description: Bolts and electrifies every airlock on the station for 90 seconds. Costs 30 processing power.
  components:
  - type: Action
    priority: -5
    itemIconStyle: BigAction
    useDelay: 120
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
  - type: InstantAction
    event: !type:MalfLockdownEvent

- type: entity
  parent: BaseAction
  id: ActionMalfDoomsday
  name: Arm Doomsday Device
  description: Begins an irreversible self-destruct. Requires 8 hacked APCs. Single use. Costs 130 processing power.
  components:
  - type: Action
    priority: -10
    itemIconStyle: BigAction
    useDelay: 1
    icon: Interface/Actions/defile.png
  - type: InstantAction
    event: !type:MalfDoomsdayEvent
